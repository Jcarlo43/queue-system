<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard – Institute of Information Technology</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0f1923;
    --surface: #172030;
    --surface2:#1e2b3c;
    --border:  rgba(255,255,255,0.08);
    --accent:  #3ecf8e;
    --warn:    #f5a623;
    --danger:  #f05b5b;
    --text:    #e8efe8;
    --muted:   #7a9080;
    --serif:   'DM Serif Display', serif;
    --sans:    'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .topbar h1 { font-family: var(--serif); font-size: 22px; font-weight: 400; }
  .topbar .biz { color: var(--muted); font-size: 13px; }

  .admin-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .admin-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(62,207,142,0.15);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 500;
  }

  .admin-details { font-size: 13px; }
  .admin-role {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .logout-btn {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
  }
  .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

  .layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 24px;
    padding: 28px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; padding: 16px; }
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
  }

  .stat-card .val  { font-family: var(--serif); font-size: 36px; line-height: 1; }
  .stat-card .lbl  { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; }
  .stat-card.accent .val { color: var(--accent); }
  .stat-card.warn .val { color: var(--warn); }

  .sec-title {
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .queue-table {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow-x: auto;
  }

  .queue-table table { width: 100%; border-collapse: collapse; min-width: 650px; }
  .queue-table th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .queue-table td {
    padding: 14px 16px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .queue-table tr:hover td { background: rgba(255,255,255,0.02); }

  .num-pill {
    display: inline-block;
    background: rgba(62,207,142,0.12);
    color: var(--accent);
    border-radius: 8px;
    padding: 3px 10px;
    font-family: var(--serif);
    font-size: 18px;
    min-width: 42px;
    text-align: center;
  }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    border-radius: 999px; padding: 3px 10px;
    font-size: 11px; font-weight: 500;
  }
  .badge.waiting { background: rgba(255,255,255,0.06); color: var(--muted); }
  .badge.called  { background: rgba(245,166,35,0.15); color: var(--warn); }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s;
  }
  .btn-done   { background: rgba(62,207,142,0.15); color: var(--accent); }
  .btn-danger { background: rgba(240,91,91,0.12); color: var(--danger); }

  .call-next-btn {
    width: 100%;
    padding: 18px;
    background: var(--accent);
    color: #0f1923;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 20px;
  }
  .call-next-btn:disabled {
    background: var(--muted);
    cursor: not-allowed;
    opacity: 0.5;
  }

  .serving-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .serving-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .serving-item:last-child { border-bottom: none; }

  .toast-notification {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--accent);
    color: #0f1923;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: 500;
    z-index: 1000;
    animation: slideIn 0.3s ease;
  }
  .toast-error {
    background: var(--danger);
    color: white;
  }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .action-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .action-btn {
    padding: 5px 10px;
    border: none;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-approached { background: #2196f3; color: white; }
  .btn-processing { background: #ff9800; color: white; }
  .btn-pending { background: #6c757d; color: white; }
  .btn-cancel { background: var(--danger); color: white; }

  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
    z-index: 2000;
  }
  .modal-content {
    background: var(--surface);
    padding: 24px;
    border-radius: 16px;
    max-width: 400px;
    width: 90%;
  }
  .modal-content select {
    width: 100%;
    padding: 10px;
    margin: 12px 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: white;
    border-radius: 8px;
  }
  .modal-buttons {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }
  .modal-buttons button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  .login-form {
    max-width: 400px;
    margin: 50px auto;
    background: var(--surface);
    padding: 40px;
    border-radius: 16px;
    text-align: center;
  }
  .login-form input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: white;
    border-radius: 8px;
  }
  .dashboard { display: none; }
</style>
</head>
<body>

<div class="container">
  <div class="topbar">
    <div>
      <h1>Queue Dashboard</h1>
      <div class="biz">Institute of Information Technology and Innovation</div>
    </div>
    <div class="admin-info" id="adminInfo" style="display:none;">
      <div class="admin-avatar" id="adminAvatar">A</div>
      <div class="admin-details">
        <div id="adminName"></div>
        <div class="admin-role" id="adminRole"></div>
      </div>
      <button onclick="logout()" class="logout-btn">Sign out</button>
    </div>
  </div>

  <div id="loginSection">
    <div class="login-form">
      <h2 style="margin-bottom: 20px;">Staff Login</h2>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button onclick="login()" class="call-next-btn" style="margin-bottom:0;">Sign In →</button>
    </div>
  </div>

  <div id="dashboard" class="dashboard">
    <div class="layout">
      <div class="main-content">
        <div class="stats-grid">
          <div class="stat-card warn">
            <div class="val" id="waitingCount">0</div>
            <div class="lbl">Waiting</div>
          </div>
          <div class="stat-card accent">
            <div class="val" id="calledCount">0</div>
            <div class="lbl">Being served</div>
          </div>
          <div class="stat-card">
            <div class="val" id="doneCount">0</div>
            <div class="lbl">Done today</div>
          </div>
          <div class="stat-card">
            <div class="val" id="myStats">0</div>
            <div class="lbl">My Served Today</div>
          </div>
        </div>

        <div class="current-serving-card" style="background: var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:20px; text-align:center;">
          <div class="sec-title">Currently Serving</div>
          <div style="font-size: 48px; font-family: var(--serif);" id="currentNumber">—</div>
          <div id="currentName">No customer assigned</div>
          <div class="action-buttons" id="currentActions" style="justify-content: center; margin-top: 15px;"></div>
        </div>

        <button class="call-next-btn" id="callBtn" onclick="callNext()">📢 Call Next Customer</button>

        <div class="sec-title">Active Queue</div>
        <div class="queue-table">
          <div id="queueList"></div>
        </div>
      </div>

      <div class="sidebar">
        <div class="serving-card">
          <div class="sec-title">Active Counters</div>
          <div id="countersList">No active counters</div>
        </div>

        <div class="serving-card">
          <div class="sec-title">Change Password</div>
          <div id="passwordMsg"></div>
          <form id="passwordForm" onsubmit="return false;">
            <input type="password" id="currentPw" placeholder="Current Password" style="width:100%; margin-bottom:10px; padding:10px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:8px;">
            <input type="password" id="newPw" placeholder="New Password (min 6 chars)" style="width:100%; margin-bottom:10px; padding:10px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:8px;">
            <input type="password" id="confirmPw" placeholder="Confirm Password" style="width:100%; margin-bottom:10px; padding:10px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:8px;">
            <button type="button" onclick="changePassword()" class="btn-done" style="width:100%;">Update Password</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://queue-system-api.onrender.com';
let adminId = localStorage.getItem('admin_id');

function login() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    
    fetch(`${API_URL}/api/admin_login.php`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            adminId = data.admin_id;
            localStorage.setItem('admin_id', adminId);
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('adminInfo').style.display = 'flex';
            document.getElementById('adminName').innerText = data.display_name;
            document.getElementById('adminAvatar').innerText = (data.display_name || 'A')[0].toUpperCase();
            loadData();
            startAutoRefresh();
        } else {
            alert('Login failed');
        }
    });
}

function logout() {
    localStorage.removeItem('admin_id');
    location.reload();
}

function callNext() {
    fetch(`${API_URL}/api/call_next.php`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ admin_id: adminId })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            showToast(`Called customer #${data.queue_number}`, 'success');
            loadData();
        } else {
            showToast(data.error || 'No customers waiting', 'error');
        }
    });
}

function markApproached(queueId) {
    fetch(`${API_URL}/api/approached.php`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ queue_id: queueId, admin_id: adminId })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            showToast('Student marked as approached', 'success');
            loadData();
        }
    });
}

function startProcessing(queueId) {
    fetch(`${API_URL}/api/start_processing.php`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ queue_id: queueId, admin_id: adminId })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            showToast('Started processing', 'success');
            loadData();
        }
    });
}

function markDone(queueId) {
    fetch(`${API_URL}/api/mark_done.php`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ queue_id: queueId, admin_id: adminId })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            showToast('Service completed!', 'success');
            loadData();
        }
    });
}

let pendingQueueId = null;
function openPendingModal(queueId) {
    pendingQueueId = queueId;
    document.getElementById('pendingModal').style.display = 'flex';
}

function submitPending() {
    const reason = document.getElementById('pendingReason').value;
    fetch(`${API_URL}/api/mark_pending.php`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ queue_id: pendingQueueId, admin_id: adminId, reason })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            closeModal('pendingModal');
            loadData();
        }
    });
}

let cancelQueueId = null;
function openCancelModal(queueId) {
    cancelQueueId = queueId;
    document.getElementById('cancelModal').style.display = 'flex';
}

function submitCancel() {
    const reason = document.getElementById('cancelReason').value;
    fetch(`${API_URL}/api/cancel_customer.php`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ queue_id: cancelQueueId, admin_id: adminId, reason })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            closeModal('cancelModal');
            loadData();
        }
    });
}

function closeModal(modalId) {
    document.getElementById(modalId).style.display = 'none';
}

function changePassword() {
    const current = document.getElementById('currentPw').value;
    const newPw = document.getElementById('newPw').value;
    const confirm = document.getElementById('confirmPw').value;
    
    if (newPw !== confirm) {
        showPasswordMsg('Passwords do not match!', 'error');
        return;
    }
    if (newPw.length < 6) {
        showPasswordMsg('Password must be at least 6 characters', 'error');
        return;
    }
    
    fetch(`${API_URL}/api/change_password.php`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ admin_id: adminId, current_password: current, new_password: newPw })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            showPasswordMsg('Password updated!', 'success');
            document.getElementById('currentPw').value = '';
            document.getElementById('newPw').value = '';
            document.getElementById('confirmPw').value = '';
        } else {
            showPasswordMsg(data.error, 'error');
        }
    });
}

function showPasswordMsg(msg, type) {
    const div = document.getElementById('passwordMsg');
    div.style.display = 'block';
    div.style.background = type === 'success' ? 'rgba(62,207,142,0.2)' : 'rgba(240,91,91,0.2)';
    div.style.padding = '10px';
    div.style.borderRadius = '8px';
    div.style.marginBottom = '10px';
    div.innerHTML = msg;
    setTimeout(() => div.style.display = 'none', 3000);
}

function loadData() {
    if (!adminId) return;
    
    fetch(`${API_URL}/api/admin_data.php?admin_id=${adminId}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById('waitingCount').innerHTML = data.waiting_count;
        document.getElementById('calledCount').innerHTML = data.called_count;
        document.getElementById('doneCount').innerHTML = data.completed_today;
        document.getElementById('myStats').innerHTML = data.my_completed;
        
        if (data.current_customer) {
            document.getElementById('currentNumber').innerHTML = `#${data.current_customer.queue_number}`;
            document.getElementById('currentName').innerHTML = data.current_customer.name;
            let actions = '';
            if (data.current_customer.status === 'called') {
                actions = `<button class="action-btn btn-approached" onclick="markApproached(${data.current_customer.id})">🚶 Approached</button>
                          <button class="action-btn btn-pending" onclick="openPendingModal(${data.current_customer.id})">⏸ Pending</button>
                          <button class="action-btn btn-cancel" onclick="openCancelModal(${data.current_customer.id})">✗ Cancel</button>`;
            } else if (data.current_customer.status === 'approached') {
                actions = `<button class="action-btn btn-processing" onclick="startProcessing(${data.current_customer.id})">⚙️ Process</button>
                          <button class="action-btn btn-pending" onclick="openPendingModal(${data.current_customer.id})">⏸ Pending</button>
                          <button class="action-btn btn-cancel" onclick="openCancelModal(${data.current_customer.id})">✗ Cancel</button>`;
            } else if (data.current_customer.status === 'processing') {
                actions = `<button class="action-btn btn-done" onclick="markDone(${data.current_customer.id})">✓ Complete</button>`;
            }
            document.getElementById('currentActions').innerHTML = actions;
        } else {
            document.getElementById('currentNumber').innerHTML = '—';
            document.getElementById('currentName').innerHTML = 'No customer assigned';
            document.getElementById('currentActions').innerHTML = '';
        }
        
        const queueHtml = data.queue.map(q => `
          <tr>
            <td><span class="num-pill">${q.queue_number}</span></td>
            <td>${q.name}${q.phone ? `<br><small>📞 ${q.phone}</small>` : ''}</td>
            <td>${q.purpose}</td>
            <td>${q.wait_mins}m</td>
            <td><span class="badge ${q.status}">${q.status}</span></td>
            <td>${q.counter_name || '—'}</td>
            <td class="action-buttons">
              ${q.status === 'called' ? `<button class="action-btn btn-approached" onclick="markApproached(${q.id})">🚶</button>` : ''}
              ${q.status === 'approached' ? `<button class="action-btn btn-processing" onclick="startProcessing(${q.id})">⚙️</button>` : ''}
              <button class="action-btn btn-pending" onclick="openPendingModal(${q.id})">⏸</button>
              <button class="action-btn btn-cancel" onclick="openCancelModal(${q.id})">✗</button>
            </td>
          </tr>
        `).join('');
        
        document.getElementById('queueList').innerHTML = `
          <table>
            <thead><tr><th>#</th><th>Customer</th><th>Purpose</th><th>Wait</th><th>Status</th><th>Counter</th><th>Actions</th></tr></thead>
            <tbody>${queueHtml || '<tr><td colspan="7" style="text-align:center">No active customers</td></tr>'}</tbody>
          </table>
        `;
        
        document.getElementById('countersList').innerHTML = (data.counters || []).map(c => `
          <div class="serving-item">
            <div><strong>${c.counter_name}</strong><br><small>${c.display_name}</small></div>
            <div>${c.queue_number ? `#${c.queue_number}` : 'Available'}</div>
          </div>
        `).join('') || '<div style="text-align:center; color:var(--muted);">No active counters</div>';
    });
}

function showToast(msg, type) {
    const toast = document.createElement('div');
    toast.className = `toast-notification ${type === 'error' ? 'toast-error' : ''}`;
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

let refreshInterval;
function startAutoRefresh() {
    if (refreshInterval) clearInterval(refreshInterval);
    refreshInterval = setInterval(loadData, 5000);
}

if (adminId) {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('adminInfo').style.display = 'flex';
    loadData();
    startAutoRefresh();
}
</script>

<!-- Modals -->
<div id="pendingModal" class="modal">
  <div class="modal-content">
    <h3>Mark as Pending</h3>
    <select id="pendingReason">
      <option value="no_show">Did not show up</option>
      <option value="stepped_away">Stepped away</option>
      <option value="need_more_time">Needs more time</option>
    </select>
    <div class="modal-buttons">
      <button onclick="submitPending()" style="background:#6c757d; color:white;">Confirm</button>
      <button onclick="closeModal('pendingModal')">Cancel</button>
    </div>
  </div>
</div>

<div id="cancelModal" class="modal">
  <div class="modal-content">
    <h3>Cancel Customer</h3>
    <select id="cancelReason">
      <option value="mistouch">Mistouch / Wrong number</option>
      <option value="duplicate">Duplicate entry</option>
      <option value="customer_left">Customer left</option>
    </select>
    <div class="modal-buttons">
      <button onclick="submitCancel()" style="background:var(--danger); color:white;">Confirm Cancel</button>
      <button onclick="closeModal('cancelModal')">Back</button>
    </div>
  </div>
</div>
</body>
</html>
