<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Join the Queue – <?= htmlspecialchars(BUSINESS_NAME) ?></title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark:   #0d4a1f;
    --green-mid:    #1a6b2f;
    --gold:         #f0c040;
    --gold-deep:    #c89a10;
    --white:        #ffffff;
    --serif:        'Playfair Display', serif;
    --sans:         'Plus Jakarta Sans', sans-serif;
  }

  html, body {
    min-height: 100vh;
    background: var(--green-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      -55deg, transparent, transparent 40px,
      rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 80px
    );
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--gold-deep), var(--gold), var(--gold-deep));
  }

  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-top: 3px solid var(--gold);
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 440px;
    backdrop-filter: blur(12px);
    animation: rise 0.5s ease both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    padding-bottom: 22px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .logo-badge {
    width: 50px; height: 50px;
    background: linear-gradient(135deg, var(--gold), var(--gold-deep));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-badge svg { width: 26px; height: 26px; fill: var(--green-dark); }

  .header-text .inst { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 2px; }
  .header-text .title { font-family: var(--serif); font-size: 20px; font-weight: 700; line-height: 1.2; color: white; }

  h1 {
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 6px;
    color: white;
  }

  .subtitle {
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    margin-bottom: 28px;
  }

  .field { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  input, select {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: var(--white);
    font-family: var(--sans);
    font-size: 15px;
    padding: 13px 16px;
    outline: none;
    transition: all 0.2s;
  }

  input::placeholder { color: rgba(255,255,255,0.3); }

  input:focus, select:focus {
    border-color: var(--gold);
    background: rgba(255,255,255,0.1);
    box-shadow: 0 0 0 3px rgba(240,192,64,0.15);
  }

  select option { background: var(--green-dark); }

  .btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--gold), var(--gold-deep));
    color: var(--green-dark);
    border: none;
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(240,192,64,0.3);
  }

  .btn:hover { box-shadow: 0 6px 28px rgba(240,192,64,0.45); transform: translateY(-1px); }
  .btn:active { transform: scale(0.98); }

  .error {
    background: rgba(220,50,50,0.12);
    border: 1px solid rgba(220,50,50,0.3);
    border-radius: 10px;
    color: #ff8080;
    font-size: 14px;
    padding: 12px 16px;
    margin-bottom: 20px;
  }

  .info-box {
    background: rgba(62,207,142,0.1);
    border: 1px solid rgba(62,207,142,0.25);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 20px;
    color: #6ee89a;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .footer-note {
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 12px;
    margin-top: 20px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="logo-badge">
      <svg viewBox="0 0 24 24"><path d="M17 11H7a1 1 0 000 2h10a1 1 0 000-2zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm1-13h-2v4H7v2h4v4h2v-4h4v-2h-4V7z"/></svg>
    </div>
    <div class="header-text">
      <div class="inst">BTECH – IITI</div>
      <div class="title">Institute of Information Technology</div>
    </div>
  </div>

  <h1>Join the Queue</h1>
  <p class="subtitle">Please fill in your details to get your queue number.</p>

  <div id="message"></div>

  <form id="queueForm">
    <div class="field">
      <label for="name">Full Name *</label>
      <input type="text" id="name" name="name" placeholder="e.g. Maria Santos" required>
    </div>

    <div class="field">
      <label for="purpose">Purpose of Visit *</label>
      <select id="purpose" required>
        <option value="" disabled selected>Select a service…</option>
        <option value="Enrollment">Enrollment</option>
        <option value="Document Request">Document Request</option>
        <option value="Inquiry / Follow-up">Inquiry / Follow-up</option>
        <option value="Complaint">Complaint</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="field">
      <label for="phone">Phone Number (optional)</label>
      <input type="tel" id="phone" name="phone" placeholder="e.g. 09171234567">
    </div>

    <button type="submit" class="btn">Get My Queue Number →</button>
  </form>

  <p class="footer-note">Your browser will remember your queue ticket. Keep this page open to receive updates.</p>
</div>

<script>
// Update this after deploying backend to Render
const API_URL = 'https://queue-system-api-lka6.onrender.com/backend/api';

document.getElementById('queueForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const name = document.getElementById('name').value;
    const purpose = document.getElementById('purpose').value;
    const phone = document.getElementById('phone').value;
    
    try {
        const response = await fetch(`${API_URL}/api/register.php`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, purpose, phone })
        });
        const data = await response.json();
        
        if (data.success) {
            window.location.href = `status.html?id=${data.queue_id}`;
        } else {
            document.getElementById('message').innerHTML = `<div class="error">⚠ ${data.error}</div>`;
        }
    } catch(error) {
        document.getElementById('message').innerHTML = `<div class="error">⚠ Network error. Please try again.</div>`;
    }
});

// Store screen resolution for better fingerprinting
if (!document.cookie.match(/screen_resolution/)) {
    document.cookie = "screen_resolution=" + screen.width + "x" + screen.height + "; path=/; max-age=31536000";
}
</script>
</body>
</html>
