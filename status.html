<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queue # – Institute of Information Technology</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark: #0d4a1f;
    --green-mid: #1a6b2f;
    --gold: #f0c040;
    --white: #ffffff;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .status-container {
    max-width: 400px;
    margin: 0 auto;
    width: 100%;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-top: 3px solid var(--gold);
    border-radius: 16px;
    padding: 40px 32px;
    backdrop-filter: blur(12px);
    text-align: center;
  }

  .queue-number {
    font-size: 72px;
    font-weight: 700;
    color: var(--gold);
    margin: 20px 0;
    font-family: 'Playfair Display', serif;
  }

  .status {
    display: inline-block;
    padding: 8px 20px;
    border-radius: 40px;
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 24px;
  }

  .status-waiting { background: rgba(255,152,0,0.2); color: #ff9800; }
  .status-called { 
    background: rgba(240,192,64,0.3); 
    color: var(--gold);
    animation: pulse 1s infinite;
  }
  .status-approached { background: rgba(33,150,243,0.2); color: #2196f3; }
  .status-processing { background: rgba(255,152,0,0.2); color: #ff9800; }
  .status-done { background: rgba(76,175,80,0.2); color: #4caf50; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  /* Flashing red overlay when called */
  @keyframes flashOverlay {
    0%, 100% { background: transparent; }
    50% { background: rgba(255, 50, 50, 0.18); }
  }
  body.alert-active {
    animation: flashOverlay 0.6s ease infinite;
  }

  .info-box {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 16px;
    margin: 20px 0;
    text-align: left;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .info-row:last-child { border-bottom: none; }

  .info-label { color: rgba(255,255,255,0.5); font-size: 13px; }
  .info-value { color: var(--gold); font-weight: 600; }

  .counter-info {
    background: rgba(62,207,142,0.1);
    border-left: 3px solid var(--gold);
    margin-top: 20px;
  }

  .btn {
    display: inline-block;
    background: linear-gradient(135deg, var(--gold), #c89a10);
    color: var(--green-dark);
    padding: 14px 28px;
    border-radius: 40px;
    text-decoration: none;
    margin-top: 20px;
    font-weight: 700;
  }

  /* Big banner when called */
  .alert-banner {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    background: linear-gradient(135deg, #ff2222, #cc0000);
    color: white;
    text-align: center;
    padding: 18px 12px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.04em;
    z-index: 9000;
    animation: pulse 0.6s infinite;
    box-shadow: 0 4px 30px rgba(255,0,0,0.5);
  }
  .alert-banner.visible { display: block; }

  .notification-area {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.92);
    color: white;
    padding: 14px 24px;
    border-radius: 40px;
    font-size: 15px;
    font-weight: 600;
    z-index: 1000;
    display: none;
    white-space: nowrap;
    border: 2px solid #ff4444;
  }
</style>
</head>
<body>

<!-- Top banner alert -->
<div class="alert-banner" id="alertBanner">🚨 YOUR NUMBER IS BEING CALLED — PROCEED TO THE COUNTER NOW! 🚨</div>

<div class="status-container">
  <div class="card">
    <h1 style="color: white; font-size: 24px;">Queue Status</h1>
    <div class="queue-number" id="queueNumber">--</div>
    <div class="status" id="status">Loading...</div>

    <div class="info-box">
      <div class="info-row">
        <span class="info-label">👤 Name:</span>
        <span class="info-value" id="customerName">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">📋 Purpose:</span>
        <span class="info-value" id="customerPurpose">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">⏳ Ahead of you:</span>
        <span class="info-value" id="waitingAhead">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">🔄 Now Serving:</span>
        <span class="info-value" id="currentServing">--</span>
      </div>
    </div>

    <div id="counterInfo" style="display:none;" class="info-box counter-info">
      <div class="info-row">
        <span class="info-label">📍 Please go to:</span>
        <span class="info-value" id="counterName" style="font-size: 20px;">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">👨‍💼 Staff:</span>
        <span class="info-value" id="staffName">--</span>
      </div>
    </div>

    <div id="actionButtons"></div>
    <a href="index.html" class="btn">New Queue →</a>
  </div>
</div>

<div class="notification-area" id="notificationArea">🔔 Your turn! Please proceed to the counter</div>

<script>
const API_URL = 'https://queue-system-api-lka6.onrender.com/backend';
const QUEUE_ID = new URLSearchParams(window.location.search).get('id');

if (!QUEUE_ID) {
    window.location.href = 'index.html';
}

let audioContext = null;
let reminderInterval = null;
let lastStatus = '';
let alertCount = 0;

function initAudio() {
    if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioContext.state === 'suspended') {
        audioContext.resume();
    }
}

/**
 * Plays a loud, attention-grabbing multi-layer siren:
 *  - Layer 1: high-gain square wave sweeping 800 → 1600 Hz
 *  - Layer 2: lower sine wave for body/rumble
 *  - Layer 3: percussive noise burst at the start of each cycle
 * Repeated `cycles` times with a short gap between each.
 */
function playUrgentAlert(cycles = 5) {
    try {
        initAudio();
        if (!audioContext) return;

        const CYCLE_MS = 600;   // ms per siren up-sweep
        const GAP_MS   = 120;   // ms silence between cycles
        const TOTAL    = cycles * (CYCLE_MS + GAP_MS);

        for (let i = 0; i < cycles; i++) {
            const startSec = audioContext.currentTime + i * (CYCLE_MS + GAP_MS) / 1000;
            const endSec   = startSec + CYCLE_MS / 1000;

            /* --- Layer 1: swept square wave (siren body) --- */
            const osc1  = audioContext.createOscillator();
            const gain1 = audioContext.createGain();
            osc1.type = 'square';
            osc1.frequency.setValueAtTime(800,  startSec);
            osc1.frequency.linearRampToValueAtTime(1600, endSec);
            gain1.gain.setValueAtTime(0.9, startSec);
            gain1.gain.setValueAtTime(0.9, endSec - 0.05);
            gain1.gain.linearRampToValueAtTime(0, endSec);
            osc1.connect(gain1);
            gain1.connect(audioContext.destination);
            osc1.start(startSec);
            osc1.stop(endSec);

            /* --- Layer 2: sine undertone for fullness --- */
            const osc2  = audioContext.createOscillator();
            const gain2 = audioContext.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(400, startSec);
            osc2.frequency.linearRampToValueAtTime(800, endSec);
            gain2.gain.setValueAtTime(0.6, startSec);
            gain2.gain.linearRampToValueAtTime(0, endSec);
            osc2.connect(gain2);
            gain2.connect(audioContext.destination);
            osc2.start(startSec);
            osc2.stop(endSec);

            /* --- Layer 3: short noise burst at cycle start --- */
            const bufSize = audioContext.sampleRate * 0.08; // 80 ms
            const buffer  = audioContext.createBuffer(1, bufSize, audioContext.sampleRate);
            const data    = buffer.getChannelData(0);
            for (let s = 0; s < bufSize; s++) data[s] = Math.random() * 2 - 1;
            const noise  = audioContext.createBufferSource();
            const nfilt  = audioContext.createBiquadFilter();
            const ngain  = audioContext.createGain();
            noise.buffer = buffer;
            nfilt.type   = 'bandpass';
            nfilt.frequency.value = 1200;
            nfilt.Q.value = 0.8;
            ngain.gain.setValueAtTime(0.7, startSec);
            ngain.gain.linearRampToValueAtTime(0, startSec + 0.08);
            noise.connect(nfilt);
            nfilt.connect(ngain);
            ngain.connect(audioContext.destination);
            noise.start(startSec);
            noise.stop(startSec + 0.08);
        }
    } catch (e) {
        console.error('Audio error:', e);
    }
}

function vibrate() {
    if ('vibrate' in navigator) {
        // Long pattern: buzz–pause repeated to get attention
        navigator.vibrate([600,150,600,150,1000,150,600,150,600]);
    }
}

function showDesktopNotification() {
    if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('🚨 IT\'S YOUR TURN!', {
            body: 'Please proceed to the counter IMMEDIATELY!',
            requireInteraction: true,
            tag: 'queue-alert'  // replaces previous notification instead of stacking
        });
    }
}

function showAlertBanner(visible) {
    document.getElementById('alertBanner').classList.toggle('visible', visible);
    document.body.classList.toggle('alert-active', visible);
}

function fullAlert() {
    playUrgentAlert(6);   // 6 siren cycles ≈ 4.3 seconds
    vibrate();
    showDesktopNotification();
    showAlertBanner(true);

    const notification = document.getElementById('notificationArea');
    notification.style.display = 'block';
    notification.innerHTML = '🚨 YOUR NUMBER IS BEING CALLED! PROCEED TO THE COUNTER NOW! 🚨';
    setTimeout(() => { notification.style.display = 'none'; }, 9000);
}

async function checkStatus() {
    try {
        const response = await fetch(`${API_URL}/api/status.php?id=${QUEUE_ID}&t=${Date.now()}`);
        const data = await response.json();

        if (data.error) return;

        document.getElementById('queueNumber').innerHTML  = `#${data.queue_number}`;
        document.getElementById('customerName').innerHTML = data.name;
        document.getElementById('customerPurpose').innerHTML = data.purpose;
        document.getElementById('waitingAhead').innerHTML = data.waiting_ahead;
        document.getElementById('currentServing').innerHTML = data.currently_serving || 'None';

        const statusText = {
            'waiting':    '⏳ Waiting in Queue',
            'called':     '🔔 IT\'S YOUR TURN! 🔔',
            'approached': '✅ Being Served',
            'processing': '⚙️ Processing',
            'done':       '✅ Service Completed',
            'cancelled':  '❌ Cancelled'
        };
        document.getElementById('status').innerHTML  = statusText[data.status] || data.status;
        document.getElementById('status').className  = `status status-${data.status}`;

        if (data.status === 'called' && data.assigned_counter) {
            document.getElementById('counterName').innerHTML = data.assigned_counter;
            document.getElementById('staffName').innerHTML   = data.assigned_staff || 'Staff';
            document.getElementById('counterInfo').style.display = 'block';
        }

        if (data.status === 'called') {
            showAlertBanner(true);
            if (lastStatus !== 'called') {
                fullAlert();
                alertCount = 0;
                if (reminderInterval) clearInterval(reminderInterval);
                reminderInterval = setInterval(() => {
                    alertCount++;
                    fullAlert();
                    if (alertCount >= 3) {
                        fetch(`${API_URL}/api/auto_pending.php`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ queue_id: QUEUE_ID })
                        });
                    }
                }, 15000);
            }
            document.getElementById('actionButtons').innerHTML = `
                <div style="background:rgba(255,50,50,0.25); border:2px solid #ff4444; padding:16px; border-radius:12px; margin-top:10px;">
                    <strong style="color:#ff6666; font-size:17px;">🔴 PLEASE GO TO THE COUNTER NOW</strong>
                </div>`;
        } else if (data.status === 'approached' || data.status === 'processing') {
            if (reminderInterval) clearInterval(reminderInterval);
            showAlertBanner(false);
            document.getElementById('actionButtons').innerHTML = `
                <div style="background:rgba(76,175,80,0.2); padding:16px; border-radius:12px; margin-top:10px;">
                    ✅ Staff is assisting you. Please wait...
                </div>`;
        } else if (data.status === 'done' || data.status === 'cancelled') {
            if (reminderInterval) clearInterval(reminderInterval);
            showAlertBanner(false);
        } else {
            showAlertBanner(false);
        }

        lastStatus = data.status;

        if (data.status !== 'done' && data.status !== 'cancelled') {
            setTimeout(checkStatus, 4000);
        }
    } catch (error) {
        console.error('Polling error:', error);
        setTimeout(checkStatus, 8000);
    }
}

// Unlock audio + request notification permission on first tap
document.body.addEventListener('click', () => {
    initAudio();
    if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
    }
}, { once: true });

checkStatus();
</script>
</body>
</html>
