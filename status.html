<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queue # – Institute of Information Technology</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark: #0d4a1f;
    --green-mid: #1a6b2f;
    --gold: #f0c040;
    --white: #ffffff;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .status-container {
    max-width: 400px;
    margin: 0 auto;
    width: 100%;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-top: 3px solid var(--gold);
    border-radius: 16px;
    padding: 40px 32px;
    backdrop-filter: blur(12px);
    text-align: center;
  }

  .queue-number {
    font-size: 72px;
    font-weight: 700;
    color: var(--gold);
    margin: 20px 0;
    font-family: 'Playfair Display', serif;
  }

  .status {
    display: inline-block;
    padding: 8px 20px;
    border-radius: 40px;
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 24px;
  }

  .status-waiting { background: rgba(255,152,0,0.2); color: #ff9800; }
  .status-called { 
    background: rgba(240,192,64,0.3); 
    color: var(--gold);
    animation: pulse 1s infinite;
  }
  .status-approached { background: rgba(33,150,243,0.2); color: #2196f3; }
  .status-processing { background: rgba(255,152,0,0.2); color: #ff9800; }
  .status-done { background: rgba(76,175,80,0.2); color: #4caf50; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .info-box {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 16px;
    margin: 20px 0;
    text-align: left;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .info-row:last-child { border-bottom: none; }

  .info-label { color: rgba(255,255,255,0.5); font-size: 13px; }
  .info-value { color: var(--gold); font-weight: 600; }

  .counter-info {
    background: rgba(62,207,142,0.1);
    border-left: 3px solid var(--gold);
    margin-top: 20px;
  }

  .btn {
    display: inline-block;
    background: linear-gradient(135deg, var(--gold), #c89a10);
    color: var(--green-dark);
    padding: 14px 28px;
    border-radius: 40px;
    text-decoration: none;
    margin-top: 20px;
    font-weight: 700;
  }

  .notification-area {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.9);
    color: white;
    padding: 12px 20px;
    border-radius: 40px;
    font-size: 14px;
    z-index: 1000;
    display: none;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="status-container">
  <div class="card">
    <h1 style="color: white; font-size: 24px;">Queue Status</h1>
    <div class="queue-number" id="queueNumber">--</div>
    <div class="status" id="status">Loading...</div>

    <div class="info-box">
      <div class="info-row">
        <span class="info-label">👤 Name:</span>
        <span class="info-value" id="customerName">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">📋 Purpose:</span>
        <span class="info-value" id="customerPurpose">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">⏳ Ahead of you:</span>
        <span class="info-value" id="waitingAhead">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">🔄 Now Serving:</span>
        <span class="info-value" id="currentServing">--</span>
      </div>
    </div>

    <div id="counterInfo" style="display:none;" class="info-box counter-info">
      <div class="info-row">
        <span class="info-label">📍 Please go to:</span>
        <span class="info-value" id="counterName" style="font-size: 20px;">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">👨‍💼 Staff:</span>
        <span class="info-value" id="staffName">--</span>
      </div>
    </div>

    <div id="actionButtons"></div>
    <a href="index.html" class="btn">New Queue →</a>
  </div>
</div>

<div class="notification-area" id="notificationArea">🔔 Your turn! Please proceed to the counter</div>

<script>
const API_URL = 'https://queue-system-api-lka6.onrender.com/backend';
const QUEUE_ID = new URLSearchParams(window.location.search).get('id');

if (!QUEUE_ID) {
    window.location.href = 'index.html';
}

let audioContext = null;
let reminderInterval = null;
let lastStatus = '';
let alertCount = 0;

function initAudio() {
    if (!audioContext && 'AudioContext' in window) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playBeep() {
    try {
        initAudio();
        if (audioContext) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.value = 880;
            gainNode.gain.value = 0.4;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.5);
            oscillator.stop(audioContext.currentTime + 0.5);
        }
    } catch(e) { console.log('Audio error:', e); }
}

function vibrate() {
    if ('vibrate' in navigator) {
        navigator.vibrate([500, 200, 500, 200, 1000, 200, 500]);
    }
}

function showDesktopNotification() {
    if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('🔔 IT\'S YOUR TURN!', {
            body: 'Please proceed to the counter immediately!',
            requireInteraction: true
        });
    }
}

function fullAlert() {
    for(let i = 0; i < 5; i++) {
        setTimeout(() => {
            playBeep();
            vibrate();
        }, i * 600);
    }
    showDesktopNotification();
    const notification = document.getElementById('notificationArea');
    notification.style.display = 'block';
    setTimeout(() => notification.style.display = 'none', 5000);
}

async function checkStatus() {
    try {
        const response = await fetch(`${API_URL}/api/status.php?id=${QUEUE_ID}&t=${Date.now()}`);
        const data = await response.json();
        
        if (data.error) return;
        
        document.getElementById('queueNumber').innerHTML = `#${data.queue_number}`;
        document.getElementById('customerName').innerHTML = data.name;
        document.getElementById('customerPurpose').innerHTML = data.purpose;
        document.getElementById('waitingAhead').innerHTML = data.waiting_ahead;
        document.getElementById('currentServing').innerHTML = data.currently_serving || 'None';
        
        const statusText = {
            'waiting': '⏳ Waiting in Queue',
            'called': '🔔 IT\'S YOUR TURN! 🔔',
            'approached': '✅ Being Served',
            'processing': '⚙️ Processing',
            'done': '✅ Service Completed',
            'cancelled': '❌ Cancelled'
        };
        document.getElementById('status').innerHTML = statusText[data.status] || data.status;
        document.getElementById('status').className = `status status-${data.status}`;
        
        if (data.status === 'called' && data.assigned_counter) {
            document.getElementById('counterName').innerHTML = data.assigned_counter;
            document.getElementById('staffName').innerHTML = data.assigned_staff || 'Staff';
            document.getElementById('counterInfo').style.display = 'block';
        }
        
        if (data.status === 'called') {
            if (lastStatus !== 'called') {
                fullAlert();
                alertCount = 0;
                if (reminderInterval) clearInterval(reminderInterval);
                reminderInterval = setInterval(() => {
                    alertCount++;
                    fullAlert();
                    if (alertCount >= 3) {
                        fetch(`${API_URL}/api/auto_pending.php`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ queue_id: QUEUE_ID })
                        });
                    }
                }, 15000);
            }
            document.getElementById('actionButtons').innerHTML = `
                <div style="background:rgba(240,192,64,0.2); padding:16px; border-radius:12px; margin-top:10px;">
                    <strong style="color:var(--gold);">🔴 PLEASE GO TO THE COUNTER NOW</strong>
                </div>
            `;
        } else if (data.status === 'approached' || data.status === 'processing') {
            if (reminderInterval) clearInterval(reminderInterval);
            document.getElementById('actionButtons').innerHTML = `
                <div style="background:rgba(76,175,80,0.2); padding:16px; border-radius:12px; margin-top:10px;">
                    ✅ Staff is assisting you. Please wait...
                </div>
            `;
        } else if (data.status === 'done') {
            if (reminderInterval) clearInterval(reminderInterval);
        } else if (data.status === 'cancelled') {
            if (reminderInterval) clearInterval(reminderInterval);
        }
        
        lastStatus = data.status;
        
        if (data.status !== 'done' && data.status !== 'cancelled') {
            setTimeout(checkStatus, 4000);
        }
    } catch (error) {
        console.error('Polling error:', error);
        setTimeout(checkStatus, 8000);
    }
}

document.body.addEventListener('click', () => {
    initAudio();
    if (audioContext) audioContext.resume();
    if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
    }
}, { once: true });

checkStatus();
</script>
</body>
</html>
